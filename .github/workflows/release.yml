name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTNAME="leda-${VERSION}-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "${OUTNAME}" ./cmd/leda
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leda-${{ matrix.goos }}-${{ matrix.goarch }}
          path: leda-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: leda-*
